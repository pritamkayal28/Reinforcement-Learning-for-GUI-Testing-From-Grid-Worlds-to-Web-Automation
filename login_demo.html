<!DOCTYPE html>
<html>
<head>
<title>RL Login Demo</title>
<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let msg = document.getElementById("msg");

    if(u === "admin" && p === "1234"){
        msg.innerHTML = "<h3 style='color:green;'>✅ Login Success</h3>";
    } else {
        msg.innerHTML = "<h3 style='color:red;'>❌ Wrong Credentials</h3>";
    }
}
</script>

</head>

<body>
<h2>Login Page</h2>


<input id="user" placeholder="Username" autocomplete="off"><br><br>
<input id="pass" placeholder="Password" type="password" autocomplete="off"><br><br>

<button onclick="login()">Login</button>

<br><br>
<div id="msg"></div>

</body>
</html>
